services:
  autolaunch-core:
    build: .
    container_name: autolaunch_engine
    restart: always
    ports:
      - "3000:3000"
      - "4000-4100:4000-4100" # Range for deployed apps
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./storage:/usr/src/app/orchestrator/tmp
    environment:
      - NODE_ENV=production
      - PLATFORM_SECRET=TRP_SECURE_888