<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>MYCIPHER // COMMAND CENTER</title>
    <script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script>
    <style>
        :root { --glow: #00ff41; --panel: rgba(10, 10, 10, 0.9); }
        body { background: #000; color: var(--glow); font-family: 'JetBrains Mono', monospace; padding: 25px; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .hud-status { display: flex; justify-content: space-between; align-items: center; background: #050505; border-bottom: 2px solid #222; padding: 15px 25px; margin: -25px -25px 25px -25px; }
        .pulse-dot { height: 8px; width: 8px; background: var(--glow); border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px var(--glow); }
        .main-grid { display: grid; grid-template-columns: 1fr 400px; gap: 20px; flex: 1; overflow: hidden; }
        #progress-container { height: 2px; width: 100%; background: #111; margin-bottom: 10px; display: none; }
        #progress-bar { height: 100%; width: 0%; background: var(--glow); transition: width 0.5s ease; }
        .project-row { background: var(--panel); border: 1px solid #222; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #333; }
        input { background: #000; border: 1px solid #333; color: var(--glow); padding: 12px; font-family: inherit; outline: none; }
        button { background: var(--glow); color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; }
        #terminal { flex: 1; padding: 15px; font-size: 11px; color: #666; overflow-y: auto; white-space: pre-wrap; border: 1px solid #111; }
    </style>
</head>
<body>
    <div class='hud-status'>
        <div><span class='pulse-dot'></span> CORE_IDENTITY: <b>SYSTEM_LIVE</b></div>
        <div style='font-size:10px; opacity:0.5;'>BRAIN_LINK: ACTIVE</div>
    </div>

    <div style='display:flex; gap:20px; align-items:center; margin-bottom:20px;'>
        <input type='text' id='repo' placeholder='TARGET_REPOSITORY_URL' style='flex:1;'>
        <input type='password' id='token' placeholder='GITHUB_TOKEN' style='width:200px;'>
        <button onclick='launch()'>COLD_START</button>
    </div>

    <div id='progress-container'><div id='progress-bar'></div></div>

    <div class='main-grid'>
        <div id='project-list'></div>
        <div style='display:flex; flex-direction:column;'>
            <div style='padding:5px 15px; background:#111; font-size:10px;'>LIVE_BRAIN_STREAM</div>
            <div id='terminal'>> AWAITING_BOOT</div>
        </div>
    </div>

    <script>
        const base = localStorage.getItem('at_base');
        const socket = io(base);
        
        socket.on('build_log', (msg) => {
            const term = document.getElementById('terminal');
            term.innerHTML += `\n${msg}`;
            term.scrollTop = term.scrollHeight;
        });

        async function launch() {
            const repoUrl = document.getElementById('repo').value;
            const githubToken = document.getElementById('token').value;
            
            if(!repoUrl) { alert('ENTER REPO URL'); return; }

            document.getElementById('terminal').innerHTML += `\n[UI] SENDING COLD_START TO ${base}/api/launch`;
            
            try {
                const response = await fetch(`${base}/api/launch`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ cloneCommand: repoUrl, githubToken: githubToken })
                });
                
                const data = await response.json();
                document.getElementById('terminal').innerHTML += `\n[BRAIN_RESPONSE] ${JSON.stringify(data)}`;
            } catch (error) {
                document.getElementById('terminal').innerHTML += `\n[FATAL_UI_ERROR] ${error.message}`;
                alert('BROWSER BLOCKED REQUEST: See Brain Stream for details.');
            }
        }

        async function load() {
            try {
                const res = await fetch(`${base}/api/projects`, { headers: { 'ngrok-skip-browser-warning': 'true' }});
                const apps = await res.json();
                const list = document.getElementById('project-list');
                list.innerHTML = '';
                apps.forEach(app => {
                    const row = document.createElement('div');
                    row.className = 'project-row';
                    const cleanBase = base.split('://')[1];
                    const appUrl = `https://${cleanBase.split(':')[0]}:${app.port}`;
                    row.innerHTML = `
                        <div><b>${app.name.toUpperCase()}</b><br/><small style='opacity:0.5'>PORT: ${app.port || 'DYN'}</small></div>
                        <button onclick="window.open('${appUrl}', '_blank')">OPEN</button>
                    `;
                    list.appendChild(row);
                });
            } catch(e) {}
        }

        setInterval(load, 5000);
        load();
    </script>
</body>
</html>
