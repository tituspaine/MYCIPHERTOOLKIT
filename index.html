<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>AUTOLAUNCH // SPATIAL OS</title>
    <script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script>
    <style>
        :root { --glow: #00ff41; --bg: #030303; --panel: rgba(15, 15, 15, 0.9); }
        body { background: var(--bg); color: var(--glow); font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        .grid-layout { display: grid; grid-template-columns: 450px 1fr; grid-template-rows: 1fr 250px; height: 100vh; }
        .sidebar { background: var(--panel); border-right: 1px solid #222; padding: 30px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .viewport { background: #000; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 40px; overflow-y: auto; position: relative; z-index: 5; }
        .console { background: #000; padding: 20px; color: #666; font-size: 11px; overflow-y: auto; grid-column: span 2; border-top: 1px solid var(--glow); line-height: 1.5; }
        .card { border: 1px solid #333; padding: 20px; border-radius: 4px; }
        .project-node { border: 1px solid var(--glow); background: #080808; padding: 20px; box-shadow: 0 0 15px rgba(0,255,65,0.2); height: fit-content; }
        .open-btn { display: block; background: var(--glow); color: #000; text-align: center; padding: 12px; text-decoration: none; font-weight: bold; margin-top: 15px; }
        .destroy-btn { display: block; border: 1px solid #ff4444; color: #ff4444; text-align: center; padding: 8px; text-decoration: none; font-size: 10px; margin-top: 10px; cursor: pointer; }
        input { background: #000; border: 2px solid #333; color: var(--glow); padding: 15px; width: 100%; box-sizing: border-box; margin-top: 10px; outline: none; font-size: 16px; }
        button { background: var(--glow); color: #000; border: none; padding: 20px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 18px; }
        .setup-wizard { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id='wizard' class='setup-wizard'>
        <div style='max-width: 500px; text-align: center; background: #080808; padding: 50px; border: 1px solid #222;'>
            <h1 style='letter-spacing: 5px; margin-bottom: 30px;'>SYSTEM_AUTH</h1>
            <input type='text' id='vpsIp' placeholder='Ngrok URL (https://...ngrok-free.dev)'>
            <button onclick='syncBackend()'>INITIATE_LINK</button>
            <p id='error-display' style='color: #ff4444; margin-top: 20px; font-size: 12px;'></p>
        </div>
    </div>
    <div class='grid-layout'>
        <div class='sidebar'>
            <div style='display:flex; justify-content:space-between;'>
                <span>OS_STATUS:</span>
                <span id='hw-status' style='color:red;'>OFFLINE</span>
            </div>
            <div class='card'>
                <h3>DEPLOY_NEW_INTERFACE</h3>
                <input type='text' id='gitUrl' placeholder='REPOS_URL (.git)'>
                <input type='password' id='githubToken' placeholder='GITHUB_PAT'>
                <button id='coldStartBtn' onclick='executeColdStart()'>EXECUTE_COLD_START</button>
            </div>
            <div id='active-list' style='font-size: 10px; opacity: 0.5;'>RE-SCANNING HARDWARE...</div>
            <button onclick='loadExisting()' style='background: #111; color: #fff; font-size: 10px;'>FORCE RE-SCAN</button>
            <button style='opacity:0.3; font-size:10px;' onclick='localStorage.clear(); location.reload();'>FULL_UI_RESET</button>
        </div>
        <div class='viewport' id='graph'></div>
        <div class='console' id='terminal'>> SYSTEM_BOOT_COMPLETE...</div>
    </div>
    <script>
        let socket;
        const log = (m) => {
            const d = document.createElement('div');
            d.innerText = `> ${m}`;
            document.getElementById('terminal').prepend(d);
        };
        function addProjectCard(name, port) {
            const base = localStorage.getItem('at_base');
            const domain = base.replace('https://', '').replace('http://', '').split('/')[0];
            const appUrl = `https://${domain.split(':')[0]}:${port}`;
            const cardId = `card-${name}`;
            const div = document.createElement('div');
            div.id = cardId; div.className = 'project-node';
            div.innerHTML = `
                <div style='font-size: 10px; opacity: 0.5;'>IDENTIFIER</div>
                <div style='font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #00ff41;'>${name.toUpperCase()}</div>
                <div style='font-size: 10px; color: #00ff41;'>● STATUS: LIVE</div>
                <div style='font-size: 10px; opacity: 0.5; margin-top:5px;'>PORT: ${port}</div>
                <a href='${appUrl}' target='_blank' class='open-btn'>OPEN_INTERFACE</a>
                <div class='destroy-btn' onclick="destroyProject('${name}')">PURGE_INSTANCE</div>
            `;
            document.getElementById('graph').appendChild(div);
        }
        async function checkPulse() {
            const base = localStorage.getItem('at_base');
            const errorDisplay = document.getElementById('error-display');
            if (!base) return;
            try {
                const res = await fetch(base + '/', {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                if (res.ok) {
                    document.getElementById('hw-status').innerText = 'ONLINE';
                    document.getElementById('hw-status').style.color = '#00ff41';
                    document.getElementById('wizard').style.display = 'none';
                    loadExisting();
                } else {
                    errorDisplay.innerText = `SERVER_REJECTED (Code: ${res.status})`;
                }
            } catch (e) {
                errorDisplay.innerText = 'CONNECTION_FAILED: Ensure VPS is on and Ngrok is active.';
            }
        }
        async function loadExisting() {
            const base = localStorage.getItem('at_base');
            try {
                const res = await fetch(`${base}/api/projects`, { headers: { 'ngrok-skip-browser-warning': 'true' }});
                const apps = await res.json();
                document.getElementById('active-list').innerText = `ACTIVE_CONTAINERS: ${apps.length}`;
                apps.forEach(app => { if (app.port) addProjectCard(app.name, app.port); });
            } catch (e) { log('SYNC_ERROR'); }
        }
        function syncBackend() {
            let url = document.getElementById('vpsIp').value.trim();
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            localStorage.setItem('at_base', url);
            checkPulse();
        }
        window.onload = checkPulse;
    </script>
</body>
</html>
