<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>AUTOLAUNCH // SPATIAL OS</title>
    <script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script>
    <style>
        :root { --glow: #00ff41; --bg: #030303; }
        body { background: var(--bg); color: var(--glow); font-family: 'JetBrains Mono', monospace; margin: 0; padding: 20px; }
        .header { border-bottom: 2px solid #222; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .manifest-container { max-width: 1200px; margin: 0 auto; }
        .project-row { background: #0a0a0a; border: 1px solid var(--glow); padding: 25px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 15px rgba(0,255,65,0.1); }
        .project-info { flex: 1; }
        .project-name { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .project-meta { font-size: 10px; opacity: 0.5; text-transform: uppercase; }
        .actions { display: flex; gap: 15px; }
        .btn-open { background: var(--glow); color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 16px; }
        .btn-purge { background: transparent; border: 1px solid #ff4444; color: #ff4444; padding: 15px 20px; cursor: pointer; font-family: inherit; font-size: 12px; }
        .sidebar-simple { background: #080808; border: 1px solid #111; padding: 20px; margin-bottom: 30px; }
        input { background: #000; border: 1px solid var(--glow); color: var(--glow); padding: 12px; width: 300px; margin-right: 10px; outline: none; }
        .setup-wizard { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        #terminal { background: #000; padding: 15px; color: #444; font-size: 11px; height: 150px; overflow-y: auto; border: 1px solid #111; margin-top: 50px; }
    </style>
</head>
<body>
    <div id='wizard' class='setup-wizard'>
        <div style='text-align: center;'>
            <h1 style='letter-spacing: 5px;'>SYSTEM_AUTH</h1>
            <input type='text' id='vpsIp' placeholder='Ngrok URL'>
            <button onclick='syncBackend()' style='background: var(--glow); padding: 15px 30px; border:none; cursor:pointer; font-weight:bold;'>INITIATE_LINK</button>
        </div>
    </div>

    <div class='manifest-container'>
        <div class='header'>
            <div>
                <h1 style='margin:0;'>MYCIPHER_DASHBOARD</h1>
                <span id='hw-status' style='color:red; font-size:12px;'>OFFLINE</span>
            </div>
            <button onclick='localStorage.clear(); location.reload();' style='background:transparent; border:1px solid #333; color:#333; cursor:pointer;'>HARD_RESET</button>
        </div>

        <div class='sidebar-simple'>
            <h3>LAUNCH_NEW_NODE</h3>
            <input type='text' id='gitUrl' placeholder='GitHub Repo URL'>
            <input type='password' id='githubToken' placeholder='PAT (token)' style='width:200px;'>
            <button onclick='executeColdStart()' style='background: var(--glow); padding: 12px 20px; border:none; font-weight:bold; cursor:pointer;'>COLD_START</button>
        </div>

        <h2>ACTIVE_PROJECTS</h2>
        <div id='project-list'>
            <p style='opacity:0.3;'>No active nodes detected. Use Cold Start to deploy.</p>
        </div>

        <div id='terminal'>> INITIALIZING SYSTEM...</div>
    </div>

    <script>
        function log(m) {
            const d = document.createElement('div');
            d.innerText = `> ${m}`;
            document.getElementById('terminal').prepend(d);
        }

        function renderProject(name, port) {
            const base = localStorage.getItem('at_base');
            const domain = base.replace('https://', '').replace('http://', '').split('/')[0];
            const appUrl = `${window.location.protocol}//${domain.split(':')[0]}:${port}`;
            
            const row = document.createElement('div');
            row.className = 'project-row';
            row.innerHTML = `
                <div class='project-info'>
                    <div class='project-name'>${name.toUpperCase()}</div>
                    <div class='project-meta'>Status: Operational | Port: ${port}</div>
                </div>
                <div class='actions'>
                    <button onclick="window.open('${appUrl}', '_blank')" class='btn-open'>OPEN_INTERFACE</button>
                    <button onclick="destroyProject('${name}')" class='btn-purge'>PURGE</button>
                </div>
            `;
            document.getElementById('project-list').prepend(row);
        }

        async function loadExisting() {
            const base = localStorage.getItem('at_base');
            try {
                const res = await fetch(`${base}/api/projects`, { headers: { 'ngrok-skip-browser-warning': 'true' }});
                const apps = await res.json();
                const list = document.getElementById('project-list');
                list.innerHTML = '';
                if (apps.length === 0) list.innerHTML = '<p opacity:0.3>No nodes active.</p>';
                apps.forEach(app => { if(app.port) renderProject(app.name, app.port); });
                document.getElementById('hw-status').innerText = 'SYSTEM_ONLINE';
                document.getElementById('hw-status').style.color = '#00ff41';
                log(`SYNC: ${apps.length} NODES LOADED`);
            } catch (e) { log('API_FETCH_ERROR'); }
        }

        function syncBackend() {
            let url = document.getElementById('vpsIp').value.trim();
            if(!url) return;
            if(!url.startsWith('http')) url = 'https://' + url;
            localStorage.setItem('at_base', url);
            location.reload();
        }

        window.onload = () => {
            const base = localStorage.getItem('at_base');
            if (base) {
                document.getElementById('wizard').style.display = 'none';
                loadExisting();
            }
        }
    </script>
</body>
</html>
