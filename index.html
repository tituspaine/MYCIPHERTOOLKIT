<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>AUTOLAUNCH // SPATIAL OS</title>
    <script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'></script>
    <style>
        :root { --glow: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--glow); font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        .app-shell { display: grid; grid-template-areas: 'input graph' 'logs logs'; grid-template-columns: 400px 1fr; grid-template-rows: 1fr 200px; height: 100vh; }
        .panel { border: 1px solid #222; padding: 20px; }
        .panel-input { grid-area: input; display: flex; flex-direction: column; gap: 15px; background: rgba(0,0,0,0.8); z-index: 10; }
        .panel-graph { grid-area: graph; position: relative; }
        .panel-logs { grid-area: logs; background: #000; overflow-y: auto; border-top: 1px solid var(--glow); font-size: 12px; }
        input, textarea { background: #111; border: 1px solid #333; color: var(--glow); padding: 12px; width: 100%; box-sizing: border-box; outline: none; }
        button { background: var(--glow); color: #000; border: none; padding: 15px; cursor: pointer; font-weight: bold; }
        .status-pill { border: 1px solid var(--glow); padding: 2px 10px; border-radius: 10px; font-size: 10px; }
    </style>
</head>
<body>
    <div class='app-shell'>
        <div class='panel panel-input'>
            <div style='display:flex; justify-content:space-between; align-items:center;'>
                <span>AUTOLAUNCH v1.0</span>
                <span class='status-pill' id='status'>READY</span>
            </div>
            <input type='text' id='gitUrl' placeholder='GIT CLONE URL'>
            <textarea id='env' rows='8' placeholder='PASTE .ENV VARIABLES HERE'></textarea>
            <button onclick='launch()'>EXECUTE COLD START</button>
            <p style='font-size:10px; color:#555;'>NOTICE: INFRASTRUCTURE CORE MUST BE ACTIVE ON TARGET DEVICE</p>
        </div>
        <div class='panel panel-graph' id='graph'></div>
        <div class='panel panel-logs' id='terminal'>
            <div style='color:#444;'>> SYSTEM_ONLINE // STANDING_BY_FOR_CLONE_COMMAND...</div>
        </div>
    </div>
    <script>
        const logs = document.getElementById('terminal');
        function log(msg) {
            const d = document.createElement('div');
            d.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.prepend(d);
        }

        // 3D Visualizer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth-400)/500, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth-400, window.innerHeight-200);
        document.getElementById('graph').appendChild(renderer.domElement);
        
        const geo = new THREE.IcosahedronGeometry(2, 1);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00ff41, wireframe: true });
        const core = new THREE.Mesh(geo, mat);
        scene.add(core);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            core.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        async function launch() {
            const url = document.getElementById('gitUrl').value;
            log(`INITIATING CLONE: ${url}`);
            // Actual API call to your VPS IP would go here
        }
    </script>
</body>
</html>
