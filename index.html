<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>AUTOLAUNCH // SPATIAL OS</title>
    <script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script>
    <style>
        :root { --glow: #00ff41; --bg: #030303; --panel: rgba(15, 15, 15, 0.9); }
        body { background: var(--bg); color: var(--glow); font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        .grid-layout { display: grid; grid-template-columns: 450px 1fr; grid-template-rows: 1fr 250px; height: 100vh; }
        .sidebar { background: var(--panel); border-right: 1px solid #222; padding: 30px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .console { background: #000; padding: 20px; color: #aaa; font-size: 11px; overflow-y: auto; grid-column: span 2; border-top: 1px solid var(--glow); line-height: 1.5; }
        .viewport { position: relative; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; }
        .card { border: 1px solid #333; padding: 20px; border-radius: 4px; }
        input { background: #000; border: 1px solid var(--glow); color: var(--glow); padding: 12px; width: 100%; box-sizing: border-box; margin-top: 10px; }
        button { background: var(--glow); color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .setup-wizard { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; text-align: center; }
        .deploy-node { border: 1px solid var(--glow); padding: 20px; background: rgba(0, 255, 65, 0.1); text-align: center; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .deploy-link { color: #fff; text-decoration: underline; font-size: 18px; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <div id='wizard' class='setup-wizard'>
        <div style='max-width: 500px;'>
            <h1 style='letter-spacing: 5px;'>ESTABLISH_LINK</h1>
            <input type='text' id='vpsIp' placeholder='https://...ngrok-free.dev'>
            <button onclick='syncBackend()'>ESTABLISH_LINK</button>
        </div>
    </div>

    <div class='grid-layout'>
        <div class='sidebar'>
            <div>STATUS: <span id='hw-status' style='color:red;'>OFFLINE</span></div>
            <div class='card'>
                <h3>1. TARGET_REPOSITORY</h3>
                <input type='text' id='gitUrl' placeholder='https://github.com/user/repo'>
                <h3>2. GITHUB_PAT</h3>
                <input type='password' id='githubToken' placeholder='ghp_xxxx'>
            </div>
            <button id='coldStartBtn' onclick='executeColdStart()'>EXECUTE_COLD_START</button>
            <button style='opacity:0.3; font-size:10px;' onclick='localStorage.clear(); location.reload();'>RESET_ALL</button>
        </div>
        <div class='viewport' id='graph'>
            <div id='status-monitor' style='text-align:center;'>
                <p style='opacity:0.5;'>AWAITING_DEPLOYMENT_COMMAND...</p>
            </div>
        </div>
        <div class='console' id='terminal'>> SYSTEM_READY...</div>
    </div>

    <script>
        let socket;
        const log = (m) => {
            const d = document.createElement('div');
            d.innerText = `[${new Date().toLocaleTimeString()}] ${m}`;
            const term = document.getElementById('terminal');
            term.prepend(d);
        };

        function initSocket(url) {
            socket = io(url);
            socket.on('build_log', (msg) => {
                log(msg);
                if(msg.includes('DEPLOYMENT_SUCCESSFUL')) {
                    document.getElementById('status-monitor').innerHTML = `
                        <div class='deploy-node'>
                            <h2>RECORD_LIVE</h2>
                            <p>CONVO-NOTES is now active on your VPS.</p>
                            <a href='#' class='deploy-link'>SCANNING_PORTS...</a>
                        </div>
                    `;
                }
            });
        }

        async function checkPulse() {
            const base = localStorage.getItem('at_base');
            if (!base) return;
            try {
                const res = await fetch(base + '/', { headers: { 'ngrok-skip-browser-warning': 'true' } });
                if (res.ok) {
                    document.getElementById('hw-status').innerText = 'ONLINE';
                    document.getElementById('hw-status').style.color = '#00ff41';
                    document.getElementById('wizard').style.display = 'none';
                    initSocket(base);
                    log('LINK_ESTABLISHED');
                }
            } catch (e) { log('CONNECTION_FAILED'); }
        }

        async function executeColdStart() {
            const base = localStorage.getItem('at_base');
            const repo = document.getElementById('gitUrl').value;
            const token = document.getElementById('githubToken').value;
            document.getElementById('status-monitor').innerHTML = "<p class='animate-pulse'>BUILD_IN_PROGRESS...</p>";
            try {
                await fetch(`${base}/api/launch`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ cloneCommand: repo, githubToken: token })
                });
            } catch (err) { log(`FATAL: ${err.message}`); }
        }

        function syncBackend() {
            let url = document.getElementById('vpsIp').value.trim();
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            localStorage.setItem('at_base', url);
            checkPulse();
        }

        window.onload = checkPulse;
    </script>
</body>
</html>
