<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>MYCIPHER // WORKSTATION</title>
    <script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script>
    <style>
        :root { --glow: #00ff41; }
        body { background: #000; color: var(--glow); font-family: 'JetBrains Mono', monospace; padding: 40px; margin: 0; }
        .header { border-bottom: 2px solid #222; padding-bottom: 20px; display: flex; justify-content: space-between; }
        .launch-panel { background: #0a0a0a; border: 1px solid #222; padding: 20px; margin: 20px 0; display: flex; gap: 20px; align-items: flex-end; }
        .project-row { background: #050505; border: 1px solid #111; padding: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 2px solid var(--glow); }
        input { background: #000; border: 1px solid #333; color: var(--glow); padding: 12px; outline: none; }
        button { background: var(--glow); color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; }
        .btn-purge { background: transparent; color: #ff4444; border: 1px solid #ff4444; }
    </style>
</head>
<body>
    <div class='header'>
        <h1 style='margin:0;'>PROJ_MANIFEST_V1</h1>
        <button onclick='localStorage.clear(); location.reload();' style='background:transparent; color:#444; font-size:10px;'>HARD_RESET</button>
    </div>

    <div class='launch-panel'>
        <div><label style='font-size:10px;'>REPOS_URL</label><br/><input type='text' id='git'></div>
        <div><label style='font-size:10px;'>TOKEN</label><br/><input type='password' id='tok'></div>
        <button onclick='launch()'>COLD_START</button>
    </div>

    <div id='project-list'></div>

    <script>
        const base = localStorage.getItem('at_base');
        if(!base) { 
            const ip = prompt('Enter Ngrok URL:'); 
            if(ip) { localStorage.setItem('at_base', ip); location.reload(); }
        }

        async function launch() {
            const res = await fetch(`${base}/api/launch`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                body: JSON.stringify({ cloneCommand: document.getElementById('git').value, githubToken: document.getElementById('tok').value })
            });
            alert('Build Initiated');
            setTimeout(load, 2000);
        }

        async function purge(name) {
            if(!confirm(`Purge ${name}?`)) return;
            await fetch(`${base}/api/destroy`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                body: JSON.stringify({ repoName: name })
            });
            load();
        }

        async function load() {
            const res = await fetch(`${base}/api/projects`, { headers: { 'ngrok-skip-browser-warning': 'true' }});
            const apps = await res.json();
            const list = document.getElementById('project-list');
            list.innerHTML = '';
            apps.forEach(app => {
                const row = document.createElement('div');
                row.className = 'project-row';
                const cleanBase = base.split('://')[1];
                const appUrl = `https://${cleanBase.split(':')[0]}:${app.port}`;
                row.innerHTML = `
                    <div><b>${app.name.toUpperCase()}</b><br/><small>PORT: ${app.port || 'DYN'}</small></div>
                    <div>
                        <button onclick="window.open('${appUrl}', '_blank')">OPEN</button>
                        <button class='btn-purge' onclick="purge('${app.name}')">PURGE</button>
                    </div>
                `;
                list.appendChild(row);
            });
        }
        load();
    </script>
</body>
</html>
