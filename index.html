<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>AUTOLAUNCH // SPATIAL OS</title>
    <script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script>
    <style>
        :root { --glow: #00ff41; --bg: #030303; --panel: rgba(15, 15, 15, 0.9); }
        body { background: var(--bg); color: var(--glow); font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        .grid-layout { display: grid; grid-template-columns: 450px 1fr; grid-template-rows: 1fr 250px; height: 100vh; }
        .sidebar { background: var(--panel); border-right: 1px solid #222; padding: 30px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .viewport { position: relative; border-bottom: 1px solid #222; display: flex; flex-wrap: wrap; gap: 20px; padding: 40px; align-content: flex-start; overflow-y: auto; }
        .console { background: #000; padding: 20px; color: #666; font-size: 11px; overflow-y: auto; grid-column: span 2; border-top: 1px solid var(--glow); line-height: 1.5; }
        .card { border: 1px solid #333; padding: 20px; border-radius: 4px; }
        .project-node { width: 300px; border: 1px solid var(--glow); background: #000; padding: 20px; position: relative; box-shadow: 0 0 15px rgba(0,255,65,0.1); flex-shrink: 0; height: fit-content; }
        .open-btn { display: block; background: var(--glow); color: #000; text-align: center; padding: 12px; text-decoration: none; font-weight: bold; margin-top: 15px; font-size: 14px; }
        .open-btn:hover { opacity: 0.8; }
        input { background: #000; border: 1px solid #333; color: var(--glow); padding: 12px; width: 100%; box-sizing: border-box; margin-top: 10px; outline: none; }
        input:focus { border-color: var(--glow); }
        button { background: var(--glow); color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .setup-wizard { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id='wizard' class='setup-wizard'>
        <div style='max-width: 400px; text-align: center;'>
            <h1 style='letter-spacing: 5px;'>SYSTEM_AUTH</h1>
            <p style='opacity: 0.5; font-size: 12px; margin-bottom: 20px;'>Enter your Ngrok or VPS Tunnel URL</p>
            <input type='text' id='vpsIp' placeholder='https://...ngrok-free.dev'>
            <button onclick='syncBackend()'>INITIATE_LINK</button>
        </div>
    </div>
    <div class='grid-layout'>
        <div class='sidebar'>
            <div style='display:flex; justify-content:space-between;'>
                <span>OS_STATUS:</span>
                <span id='hw-status' style='color:red;'>OFFLINE</span>
            </div>
            <div class='card'>
                <h3>DEPLOY_NEW_INTERFACE</h3>
                <input type='text' id='gitUrl' placeholder='REPOS_URL (.git)'>
                <input type='password' id='githubToken' placeholder='GITHUB_PAT (Optional)'>
                <button id='coldStartBtn' onclick='executeColdStart()'>EXECUTE_COLD_START</button>
            </div>
            <div id='active-list' style='font-size: 12px; opacity: 0.5;'>SCANNING_ACTIVE_PROJECTS...</div>
            <button style='opacity:0.3; font-size:10px;' onclick='localStorage.clear(); location.reload();'>HARD_RESET</button>
        </div>
        <div class='viewport' id='graph'></div>
        <div class='console' id='terminal'>> SYSTEM_BOOT_COMPLETE...</div>
    </div>
    <script>
        let socket;
        const log = (m) => {
            const d = document.createElement('div');
            d.innerText = `> ${m}`;
            document.getElementById('terminal').prepend(d);
        };

        function addProjectCard(name, port) {
            if (!port || port === 'PENDING') return; 
            const base = localStorage.getItem('at_base');
            const cleanBase = base.replace('https://', '').replace('http://', '').split(':')[0];
            const appUrl = `${window.location.protocol}//${cleanBase.split('/')[0]}:${port}`;
            
            const cardId = `card-${name}`;
            if(document.getElementById(cardId)) document.getElementById(cardId).remove();

            const div = document.createElement('div');
            div.id = cardId;
            div.className = 'project-node';
            div.innerHTML = `
                <div style='font-size: 10px; opacity: 0.5;'>PROJECT_IDENTIFIER</div>
                <div style='font-size: 20px; font-weight: bold; margin-bottom: 10px;'>${name.toUpperCase()}</div>
                <div style='font-size: 10px; color: #00ff41;'>● STATUS: RUNNING</div>
                <div style='font-size: 10px; opacity: 0.5; margin-top:5px;'>VIRTUAL_PORT: ${port}</div>
                <a href='${appUrl}' target='_blank' class='open-btn'>OPEN_INTERFACE</a>
            `;
            document.getElementById('graph').appendChild(div);
        }

        function initSocket(url) {
            socket = io(url);
            socket.on('build_log', (msg) => log(msg));
            socket.on('project_ready', (data) => addProjectCard(data.name, data.port));
        }

        async function loadExisting() {
            const base = localStorage.getItem('at_base');
            try {
                const res = await fetch(`${base}/api/projects`, { headers: { 'ngrok-skip-browser-warning': 'true' }});
                const apps = await res.json();
                document.getElementById('active-list').innerText = `ACTIVE_CONTAINERS: ${apps.length}`;
                apps.forEach(app => {
                    if (app.port !== 'PENDING') addProjectCard(app.name, app.port);
                });
            } catch(e) { log('SYNC_ERROR: RECOVERY_FAILED'); }
        }

        async function checkPulse() {
            const base = localStorage.getItem('at_base');
            if (!base) return;
            try {
                const res = await fetch(base + '/', { headers: { 'ngrok-skip-browser-warning': 'true' } });
                if (res.ok) {
                    document.getElementById('hw-status').innerText = 'ONLINE';
                    document.getElementById('hw-status').style.color = '#00ff41';
                    document.getElementById('wizard').style.display = 'none';
                    initSocket(base);
                    loadExisting();
                }
            } catch (e) { log('CONNECTION_FAILED'); }
        }

        async function executeColdStart() {
            const base = localStorage.getItem('at_base');
            const repo = document.getElementById('gitUrl').value;
            const token = document.getElementById('githubToken').value;
            log(`INITIATING_DEPLOYMENT: ${repo}`);
            try {
                await fetch(`${base}/api/launch`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ cloneCommand: repo, githubToken: token })
                });
            } catch (err) { log(`FATAL: ${err.message}`); }
        }

        function syncBackend() {
            let url = document.getElementById('vpsIp').value.trim();
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            localStorage.setItem('at_base', url);
            checkPulse();
        }

        window.onload = checkPulse;
    </script>
</body>
</html>
