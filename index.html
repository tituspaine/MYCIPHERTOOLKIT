<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>AUTOLAUNCH // SPATIAL OS</title>
    <script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'></script>
    <style>
        :root { --glow: #00ff41; --bg: #030303; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--glow); font-family: 'JetBrains Mono', monospace; margin: 0; overflow-x: hidden; }
        
        /* Liquid Grid Layout */
        .app-shell { display: grid; grid-template-areas: 'input' 'graph' 'logs'; height: 100vh; }
        @media (min-width: 1024px) {
            .app-shell { grid-template-areas: 'input graph' 'logs logs'; grid-template-columns: 400px 1fr; grid-template-rows: 1fr 300px; }
        }

        .panel-input { grid-area: input; border: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .panel-graph { grid-area: graph; border: 1px solid #222; min-height: 300px; position: relative; }
        .panel-logs { grid-area: logs; border-top: 1px solid var(--glow); background: #000; padding: 15px; overflow-y: scroll; }

        input, textarea { background: #000; border: 1px solid #333; color: var(--glow); padding: 12px; width: 100%; outline: none; }
        input:focus { border-color: var(--glow); box-shadow: 0 0 10px rgba(0,255,65,0.1); }
        button { background: var(--glow); color: black; border: none; padding: 15px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #00cc33; }
    </style>
</head>
<body>
    <div class='app-shell'>
        <div class='panel-input'>
            <h2>DEPLOYMENT_CORE</h2>
            <input type='text' id='gitUrl' placeholder='GIT CLONE URL'>
            <textarea id='env' placeholder='PASTE .ENV (KEY=VALUE)' rows='8'></textarea>
            <button onclick='launch()'>START ENGINE</button>
            <div id='status' style='margin-top: 20px;'>STATUS: STANDBY</div>
        </div>
        
        <div class='panel-graph' id='graph'></div>

        <div class='panel-logs' id='terminal'>
            <div style='color: #888;'>> SYSTEM READY... esperando repositório</div>
        </div>
    </div>

    <script>
        const ioClient = io();
        const terminal = document.getElementById('terminal');

        ioClient.on('logs', msg => {
            const div = document.createElement('div');
            div.style.borderLeft = '2px solid #222';
            div.style.paddingLeft = '10px';
            div.style.marginBottom = '5px';
            div.innerText = `> ${msg}`;
            terminal.prepend(div);
        });

        async function launch() {
            const url = document.getElementById('gitUrl').value;
            const env = document.getElementById('env').value;
            document.getElementById('status').innerText = 'STATUS: ACQUIRING...';
            
            await fetch('/api/launch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ cloneCommand: url, envVars: env })
            });
        }

        /* 3D GRAPH VISUALS */
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        document.getElementById('graph').appendChild(renderer.domElement);
        renderer.setSize(window.innerWidth > 1024 ? window.innerWidth - 400 : window.innerWidth, 500);
        
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);

        camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
