<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>MYCIPHER DASHBOARD</title>
    <script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script>
    <style>
        :root { --glow: #00ff41; }
        body { background: #050505; color: var(--glow); font-family: 'JetBrains Mono', monospace; padding: 40px; }
        .header { border-bottom: 2px solid #222; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .project-row { background: #0a0a0a; border: 1px solid #111; padding: 30px; margin-top: 20px; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border-left: 4px solid var(--glow); }
        .project-info { flex: 1; }
        .btn-open { background: var(--glow); color: #000; border: none; padding: 18px 40px; font-weight: bold; cursor: pointer; font-size: 18px; text-transform: uppercase; }
        .btn-purge { background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 18px 20px; margin-left: 10px; cursor: pointer; }
        .console { background: #000; color: #444; padding: 15px; margin-top: 50px; font-size: 10px; border-top: 1px solid #111; }
        .setup-wizard { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { background: #000; border: 1px solid #333; color: var(--glow); padding: 15px; margin: 10px; width: 300px; }
    </style>
</head>
<body>
    <div id='wizard' class='setup-wizard' style='display:none;'>
        <h1>SYSTEM_AUTH</h1>
        <input type='text' id='vpsIp' placeholder='Ngrok URL'>
        <button onclick='syncBackend()' style='background:var(--glow); padding: 15px 30px; border:none; font-weight:bold;'>INITIATE_LINK</button>
    </div>

    <div class='header'>
        <div>
            <h1 style='margin:0;'>MYCIPHER_PROJECT_MANIFEST</h1>
            <div id='hw-status'>Checking Hardware...</div>
        </div>
        <button onclick='localStorage.clear(); location.reload();' style='color:#333; background:none; border:none; cursor:pointer;'>[HARD_RESET]</button>
    </div>

    <div id='project-list' style='margin-top:40px;'>
        <p style='opacity:0.2;'>Scanning for active hardware nodes...</p>
    </div>

    <div class='console' id='terminal'>> SYSTEM_BOOT_COMPLETE</div>

    <script>
        function log(m) { const d = document.createElement('div'); d.innerText = `> ${m}`; document.getElementById('terminal').prepend(d); }

        async function loadExisting() {
            const base = localStorage.getItem('at_base');
            try {
                const res = await fetch(`${base}/api/projects`, { headers: { 'ngrok-skip-browser-warning': 'true' }});
                const apps = await res.json();
                const list = document.getElementById('project-list');
                list.innerHTML = '';
                
                if (apps.length === 0) list.innerHTML = '<h3>ZERO_NODES_DETECTED</h3>';
                
                apps.forEach(app => {
                    const domain = base.replace('https://','').replace('http://','').split('/')[0].split(':')[0];
                    const appUrl = `https://${domain}:${app.port}`;
                    
                    const row = document.createElement('div');
                    row.className = 'project-row';
                    row.innerHTML = `
                        <div class='project-info'>
                            <div style='font-size:10px; opacity:0.5;'>IDENTIFIER</div>
                            <div style='font-size:24px; font-weight:bold;'>${app.name.toUpperCase()}</div>
                            <div style='font-size:12px; margin-top:5px;'>PORT: ${app.port} | NODE: PRODUCTION</div>
                        </div>
                        <div>
                            <button onclick="window.open('${appUrl}', '_blank')" class='btn-open'>OPEN_INTERFACE</button>
                            <button onclick="purge('${app.name}')" class='btn-purge'>PURGE</button>
                        </div>
                    `;
                    list.appendChild(row);
                });
                
                document.getElementById('hw-status').innerText = 'SYSTEM_ONLINE';
                document.getElementById('hw-status').style.color = '#00ff41';
                log(`MANIFEST_SYNC: ${apps.length} NODES RENDERED`);
            } catch (e) { log('SYNC_ERROR'); }
        }

        function syncBackend() {
            let url = document.getElementById('vpsIp').value.trim();
            if(!url) return;
            if(!url.startsWith('http')) url = 'https://' + url;
            localStorage.setItem('at_base', url);
            location.reload();
        }

        window.onload = () => {
            if(!localStorage.getItem('at_base')) document.getElementById('wizard').style.display='flex';
            else loadExisting();
        };
    </script>
</body>
</html>
