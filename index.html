<!DOCTYPE html>
<html lang='en'>
<head>
    <title>AutoLaunch | Command Center</title>
    <script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'JetBrains Mono', monospace; margin: 0; display: grid; grid-template-columns: 350px 1fr 300px; height: 100vh; }
        .panel { border: 1px solid #222; padding: 20px; overflow-y: auto; }
        #canvas-container { background: #000; position: relative; }
        textarea { background: #000; border: 1px solid #00ff41; color: #00ff41; width: 100%; height: 100px; margin: 10px 0; }
        .log-line { font-size: 10px; color: #888; border-bottom: 1px solid #111; }
    </style>
</head>
<body>
    <div class='panel'>
        <h3>COMMAND_INPUT</h3>
        <input type='text' id='git' placeholder='git clone ...' style='width:90%;'>
        <textarea id='env' placeholder='PASTE .ENV SECRETS HERE'></textarea>
        <label><input type='checkbox' id='db'> AUTO_PROVISION_POSTGRES</label>
        <button onclick='launch()' style='width:100%; margin-top:10px; background:#00ff41;'>DEPLOY_NODE</button>
    </div>

    <div id='canvas-container'>
        <!-- 3D Node Map Renders Here -->
    </div>

    <div class='panel'>
        <h3>LIVE_STREAMS</h3>
        <div id='logs'></div>
    </div>

    <script>
        const socket = io();
        
        // 3D Visualizer Logic
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 650, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        function addNode(name) {
            const geom = new THREE.SphereGeometry(0.5, 32, 32);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ff41, wireframe: true });
            const node = new THREE.Mesh(geom, mat);
            node.position.set(Math.random()*5-2.5, Math.random()*5-2.5, Math.random()*5-2.5);
            scene.add(node);
        }
        camera.position.z = 10;
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();

        async function launch() {
            const git = document.getElementById('git').value;
            const env = document.getElementById('env').value;
            const db = document.getElementById('db').checked;
            const res = await fetch('/api/launch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ cloneCommand: git, envVars: env, usePostgres: db })
            });
            const data = await res.json();
            socket.emit('join-logs', data.subdomain);
            addNode(data.subdomain);
        }

        socket.on('log', (msg) => {
            const div = document.createElement('div');
            div.className = 'log-line';
            div.innerText = msg;
            document.getElementById('logs').prepend(div);
        });
    </script>
</body>
</html>
