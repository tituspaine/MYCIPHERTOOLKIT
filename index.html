<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>AutoLaunch | Secure Gate</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .shield { border: 1px solid #00ff41; padding: 40px; box-shadow: 0 0 20px rgba(0,255,65,0.2); width: 350px; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 100%; margin-bottom: 10px; }
        button { width: 106%; background: #00ff41; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        #main-ui { display: none; width: 100vw; height: 100vh; flex-direction: column; }
    </style>
</head>
<body>
    <div id='login-gate' class='shield'>
        <h2>ACCESS_REQUIRED</h2>
        <input type='text' id='user' placeholder='USERNAME'>
        <input type='password' id='pass' placeholder='PASSWORD'>
        <button onclick='login()'>INITIATE_GATE</button>
    </div>

    <div id='main-ui'>
        <div style='padding: 20px; border-bottom: 1px solid #333;'>SYSTEM // ACTIVE_SESSIONS</div>
        <div style='padding: 40px;'>
            <input type='text' id='gitCmd' placeholder='PASTE CLONE COMMAND'>
            <button onclick='launch()'>EXECUTE_BUILD</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('at_token');
        if (token) showUI();

        async function login() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('at_token', data.token);
                showUI();
            } else alert('UNAUTHORIZED');
        }

        function showUI() {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
        }

        async function launch() {
            const cmd = document.getElementById('gitCmd').value;
            const res = await fetch('/api/launch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('at_token')}` },
                body: JSON.stringify({ cloneCommand: cmd })
            });
            const data = await res.json();
            alert(`DEPLOYED AT PORT: ${data.port}`);
        }
    </script>
</body>
</html>
